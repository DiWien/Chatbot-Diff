<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chatbot Diff AI</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body class="landing">
  <main class="hero">
    <section class="hero-card">
      <div class="brand"><span class="logo">CD</span><span>Chatbot Diff</span></div>
      <h1>Chào mừng đến với Chatbot Diff AI</h1>
      <p>Hệ thống chatbot AI riêng dùng để kết nối với website Gym Diff.</p>
      <div class="hero-actions">
        <a class="btn primary" href="/login">Đăng nhập Admin</a>
        <button class="btn" id="checkApi">Kiểm tra API</button>
        <a class="btn ghost" href="/README.md">Tài liệu hướng dẫn</a>
      </div>
      <div class="status-grid">
        <div class="status-card"><small>Server</small><strong id="serverStatus">Đang kiểm tra</strong></div>
        <div class="status-card"><small>AI Provider</small><strong id="provider">-</strong></div>
        <div class="status-card"><small>Model</small><strong id="model">-</strong></div>
        <div class="status-card"><small>Version</small><strong id="version">-</strong></div>
      </div>
    </section>
  </main>
  <script src="/assets/app.js"></script>
</body>
</html>
